{% extends 'base.html' %}
{% block title %}Nouveau mot de passe — {{ site_name }}{% endblock %}
{% block newsletter_strip %}{% endblock %}
{% block content %}
<div class="container py-5 d-flex align-items-center justify-content-center min-vh-100">
  <div style="max-width:420px;width:100%">
    <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">
      <h1 class="fs-3 fw-bold mb-4">Nouveau mot de passe</h1>
      <form method="post">{% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100 mt-3">Enregistrer</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
