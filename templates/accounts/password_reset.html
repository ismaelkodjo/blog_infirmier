{% extends 'base.html' %}
{% block title %}Réinitialiser le mot de passe — {{ site_name }}{% endblock %}
{% block newsletter_strip %}{% endblock %}



{% block content %}
<div class="container py-5 d-flex align-items-center justify-content-center min-vh-100">
  <div style="max-width:420px;width:100%">
    <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">
      <h1 class="fs-3 fw-bold mb-2"><i class="bi bi-key me-2 text-primary"></i>Mot de passe oublié</h1>
      <p class="text-muted mb-4">Entrez votre email, nous vous enverrons un lien de réinitialisation.</p>
      <form method="post">{% csrf_token %}
        <input type="email" name="email" class="form-control mb-3" placeholder="Votre email" required>
        <button type="submit" class="btn btn-primary w-100">Envoyer le lien</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
