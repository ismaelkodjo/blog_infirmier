{% extends 'base.html' %}
{% block title %}Confirmer la désinscription — Blog Infirmier{% endblock %}
{% block newsletter_strip %}{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <i class="bi bi-envelope-exclamation text-warning" style="font-size:5rem;"></i>
  <h1 class="fs-2 fw-bold mt-3 mb-2">Confirmer la désinscription</h1>
  <p class="text-muted lead">Voulez-vous vraiment vous désinscrire de la newsletter ?</p>
  <form method="post" action="{% url 'newsletter:unsubscribe' token %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger mt-3 me-2">Oui, me désinscrire</button>
    <a href="{% url 'core:home' %}" class="btn btn-secondary mt-3">Annuler</a>
  </form>
</div>
{% endblock %}
